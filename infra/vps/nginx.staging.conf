# Nginx config for Staging API on VPS
# Path: /etc/nginx/sites-available/staging-api.knok-knok.ru

server {
    listen 8443 ssl;
    server_name staging-api.knok-knok.ru;

    # SSL (будет сгенерирован Certbot)
    # ssl_certificate /etc/letsencrypt/live/staging-api.knok-knok.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/staging-api.knok-knok.ru/privkey.pem;

    location / {
        proxy_pass http://10.0.0.2:8001; # Домашний сервер (порт Staging Kong)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Разрешаем CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
