# Nginx config for Dev API (PocketBase) on VPS
# Path: /etc/nginx/sites-available/dev-api.knok-knok.ru

server {
    listen 80;
    server_name dev-api.knok-knok.ru;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 8443 ssl;
    server_name dev-api.knok-knok.ru;

    # SSL (будет сгенерирован Certbot)
    # ssl_certificate /etc/letsencrypt/live/dev-api.knok-knok.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dev-api.knok-knok.ru/privkey.pem;

    location / {
        # PocketBase Dev Proxy (Port 9090 on Home Server)
        proxy_pass http://10.50.0.2:9090; 
        proxy_http_version 1.1;
        
        # Realtime (SSE) optimization
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding off;
        proxy_read_timeout 24h;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,apikey' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
