# docker-compose.pb.yml
# Запуск PocketBase на домашнем сервере (заменяет всю Supabase-инфраструктуру).
#
# Запуск:
#   docker compose -f ~/knock-knock/infra/home/docker-compose.pb.yml up -d
#
# Остановка:
#   docker compose -f ~/knock-knock/infra/home/docker-compose.pb.yml down
#
# Логи:
#   docker logs knock-knock-pb -f

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: knock-knock-pb
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      # Данные PocketBase (БД SQLite + файлы)
      - ./pb_data:/pb/pb_data
      # Кастомные хуки и расширения (опционально)
      - ./pb_hooks:/pb/pb_hooks
    environment:
      # Опциональные переменные
      PB_ENCRYPTION_KEY: "${PB_ENCRYPTION_KEY:-}"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
