# docker-compose.pb.yml
# Запуск PocketBase на домашнем сервере (заменяет всю Supabase-инфраструктуру).
#
# Запуск:
#   docker compose -f ~/knock-knock/infra/home/docker-compose.pb.yml up -d
#
# Остановка:
#   docker compose -f ~/knock-knock/infra/home/docker-compose.pb.yml down
#
# Логи:
#   docker logs knock-knock-pb -f

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: knock-knock-pb
    restart: unless-stopped
    command: 
      - serve 
      - --http=0.0.0.0:8090 
      - --dir=/pb/pb_data 
      - --hooksDir=/pb/pb_hooks
    ports:
      - "8090:8090"
    volumes:
      # Данные PocketBase (БД SQLite + файлы)
      - /home/alex/knok-knok-bd:/pb/pb_data
      # Кастомные хуки и расширения (опционально)
      - ./pb_hooks:/pb/pb_hooks
      - ./pb_schema.json:/pb/pb_schema.json
    environment:
      # Опциональные переменные
      PB_ENCRYPTION_KEY: "${PB_ENCRYPTION_KEY:-}"
      PB_SMTP_HOST: "${PB_SMTP_HOST}"
      PB_SMTP_PORT: "${PB_SMTP_PORT}"
      PB_SMTP_USER: "${PB_SMTP_USER}"
      PB_SMTP_PASS: "${PB_SMTP_PASS}"
      PB_SMTP_TLS: "${PB_SMTP_TLS:-true}"
      PB_PUSH_GATEWAY_URL: "http://push-gateway:4000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - pb_network
  push-gateway:
    build: ./push-gateway
    container_name: knock-knock-push
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=mailto:admin@knok-knok.ru
    networks:
      - pb_network
    depends_on:
      - pocketbase


networks:
  pb_network:
    external: true