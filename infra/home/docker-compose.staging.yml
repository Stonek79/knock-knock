# docker-compose.staging.yml
# Этот файл является копией основного docker-compose.yml от Supabase (из ~/supabase/docker)
# НО с измененными портами для изоляции.

services:
  kong:
    # Изолированный API Gateway для Staging
    ports:
      - "8001:8000"  # HTTP: staging-api.knok-knok.ru
      - "8444:8443"  # HTTPS (если нужно напрямую)

  studio:
    # Изолированная панель управления
    ports:
      - "3002:3000"  # Было 3001 в продакшене

  pooler:
    # Изолированный доступ к БД (Supavisor)
    ports:
      - "54323:5432" # Прямой доступ к тестовой БД
      - "65431:6543" # Вспомогательный порт

# ПРИМЕЧАНИЕ: Чтобы запустить это на сервере:
# 1. cd ~/supabase/docker
# 2. cp .env .env.staging (и поменяйте в нем префикс контейнеров или используйте -p staging)
# 3. docker compose -f docker-compose.staging.yml -p staging up -d
