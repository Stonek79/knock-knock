services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: knock-knock-pb
    restart: unless-stopped
    command: 
      - serve 
      - --http=0.0.0.0:8090 
      - --dir=/pb/pb_data 
      - --hooksDir=/pb/pb_hooks
    ports:
      - "8090:8090"
    volumes:
      - /home/alex/knok-knok-bd/pb_data:/pb/pb_data
      - ../home/pb_hooks:/pb/pb_hooks
      - ../home/pb_schema.json:/pb/pb_schema.json
    env_file:
      - .env
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
      - PB_SMTP_HOST=${PB_SMTP_HOST:-}
      - PB_SMTP_PORT=${PB_SMTP_PORT:-}
      - PB_SMTP_USER=${PB_SMTP_USER:-}
      - PB_SMTP_PASS=${PB_SMTP_PASS:-}
      - PB_SMTP_TLS=${PB_SMTP_TLS:-true}
      - PB_PUSH_GATEWAY_URL=http://knock-knock-push:4000
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - default

networks:
  default:
    name: knock-knock-net
    external: true
